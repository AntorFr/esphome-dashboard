name: Validate

on:
  push:
  pull_request:

jobs:
  esphome-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ESPHome
        run: pip install esphome
      - name: Validate configs (schema + codegen)
        run: |
          esphome config tests/test_dial.yaml
          esphome config tests/test_d1001.yaml
