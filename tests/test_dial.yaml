# Validation schéma/codegen pour le M5Stack Dial.
#   esphome config tests/test_dial.yaml
esphome:
  name: test-dial

external_components:
  - source:
      type: local
      path: ../components

packages:
  board: !include ../packages/boards/m5stack_dial.yaml

logger:

ha_dashboard:
  profile: dial
  encoder: dial_encoder
  encoder_button: dial_button
  groups:
    - name: Salon
      icon: sofa
      cards:
        - { type: light, entity: light.salon_plafond }
        - { type: switch, entity: switch.salon_prise }
    - name: Cuisine
      cards:
        - { type: light, entity: light.cuisine_spots, color: "#FF8800" }
