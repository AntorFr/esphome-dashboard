# Validation schéma/codegen pour le Seeed reTerminal D1001 (ESP32-P4).
#   esphome config tests/test_d1001.yaml
esphome:
  name: test-d1001

external_components:
  - source:
      type: local
      path: ../components

packages:
  board: !include ../packages/boards/reterminal_d1001.yaml
  fonts: !include ../packages/fonts/montserrat_fr.yaml

logger:

# api (+ network) requis : ha_dashboard tire homeassistant_addon (cover/climate/media).
wifi:
  ssid: "test-ssid"
  password: "test-password"
api:

switch:
  - platform: template
    id: sw_salon_prise
    optimistic: true

# Light proxy (state in + command out) for a HA light entity, bound by a light card.
homeassistant_addon:
  lights:
    - id: light_salon
      entity_id: light.salon_plafond

# Climate proxy (reports hvac_mode/action, commands modes + setpoint) for climate cards.
climate:
  - platform: homeassistant_addon
    id: clim_salon
    entity_id: climate.salon
    internal: true

ha_dashboard:
  profile: reterminal_d1001
  font_small: ha_font_small
  font_medium: ha_font_medium
  font_large: ha_font_large
  font_icons_lg: ha_font_icons_lg
  font_nestor: ha_font_nestor
  font_nestor_lg: ha_font_nestor_lg
  groups:
    - name: Salon
      icon: sofa
      cards:
        - { type: light, light_id: light_salon, name: "Plafond salon" }
        - { type: switch, switch_id: sw_salon_prise, name: "Prise salon" }
        - { type: climate, climate_id: clim_salon, name: "Clim", climate_kind: ac }
    - name: Cuisine
      cards:
        - { type: switch, switch_id: sw_salon_prise, name: "Prise (test)" }
