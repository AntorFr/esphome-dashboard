# Seeed reTerminal D1001 — ESP32-P4 (+ ESP32-C6 WiFi/BLE via SDIO).
# Écran MIPI-DSI 800x1280 portrait (modèle intégré SEEED-RETERMINAL-D1001).
# Brochage extrait du SCHÉMA OFFICIEL Seeed (reTerminal D1001_sch.pdf, rev v01).
#
# ⚠️ TACTILE : le contrôleur est un GSL3670 (SiLead) — NON SUPPORTÉ par ESPHome
#    (aucune plateforme touchscreen gsl/silead). L'écran + le WiFi fonctionnent, mais
#    la navigation tactile nécessitera un composant externe GSL3670 (TODO).
#    Voir docs/lessons-learned.md.
# Enable the Montserrat font sizes used by the LVGL renderer (built in C++, so the lvgl
# component can't auto-detect them). Build flags are read by lvgl's lv_conf.h generator.
esphome:
  platformio_options:
    build_flags:
      - "-DLV_FONT_MONTSERRAT_16=1"
      - "-DLV_FONT_MONTSERRAT_20=1"
      - "-DLV_FONT_MONTSERRAT_28=1"
      - "-DLV_FONT_MONTSERRAT_40=1"
      - "-DLV_FONT_MONTSERRAT_48=1"
  on_boot:
    # Enable the speaker power amplifier (direct GPIO53 per the Seeed BSP) — without it the
    # ES8311 codec runs but no sound reaches the speaker.
    - priority: -100
      then:
        - output.turn_on: d1001_audio_pa

esp32:
  board: esp32-p4-evboard
  cpu_frequency: 360MHz
  # reTerminal D1001 has 32 MB onboard QSPI flash (+ 32 MB PSRAM), per Seeed specs. Declaring
  # the real size gives a large app partition (the default 4 MB assumption caps the app at
  # ~1.84 MB, which the firmware exceeds once the Music Library launcher / http_request + TLS
  # is included). 32 MB OTA requires enabling IDF experimental features (below).
  flash_size: 32MB
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true
      # Execute code/rodata from PSRAM so tasks keep running when the flash cache is disabled
      # (flash write/erase). Needed on the P4 once the audio stack does flash ops, otherwise
      # boot asserts esp_task_stack_is_sane_cache_disabled. Maps to CONFIG_SPIRAM_XIP_FROM_PSRAM.
      execute_from_psram: true

# PSRAM à pleine vitesse (200 MHz) : indispensable pour alimenter le scanout MIPI-DSI
# 800x1280 sans underrun (sinon écran noir / corrompu). Vitesses P4 : 20/100/200 MHz.
psram:
  speed: 200MHZ

# LDO interne alimentant le PHY MIPI-DSI du P4 (canal 3, 2.5V).
esp_ldo:
  - id: ldo_mipi_phy
    channel: 3
    voltage: 2.5V

# WiFi/BLE via le co-processeur ESP32-C6 sur SDIO (le P4 n'a pas de PHY radio).
# Pins schéma : CMD=GPIO6, CLK=GPIO11, D0..D3=GPIO7/8/9/10, C6_CHIP_PU(reset)=GPIO13.
# Le bloc `wifi:` (credentials) reste dans la config device.
esp32_hosted:
  type: sdio
  variant: ESP32C6
  reset_pin: GPIO13
  cmd_pin: GPIO6
  clk_pin: GPIO11
  d0_pin: GPIO7
  d1_pin: GPIO8
  d2_pin: GPIO9
  d3_pin: GPIO10
  active_high: true
  sdio_frequency: 20MHz

# I2C "système" (I2C1 du schéma) : IO expander, RTC, IMU, codec, ADC, chargeur.
i2c:
  - id: i2c_sys
    sda: GPIO20
    scl: GPIO21
    frequency: 400kHz
    scan: false
  # I2C "écran/caméra" (I2C0 du schéma) : touch GSL3670 (0x40) + caméra.
  - id: i2c_panel
    sda: GPIO37
    scl: GPIO38
    frequency: 400kHz
    scan: false

# IO expander XL9535 @ 0x20 (sur I2C système) : pilote enable/reset de l'écran
# (et reset tactile EXP_GPO12). Référencé par le modèle d'écran ci-dessous.
xl9535:
  - id: d1001_expander
    i2c_id: i2c_sys
    address: 0x20

# LCD backlight boost driver (EN/PWM = net LCD_PWM = GPIO14). Without driving it the
# panel power/scanout can be on yet the screen stays black. ALWAYS_ON at full brightness.
output:
  - platform: ledc
    id: d1001_bl_pwm
    pin: GPIO14
    frequency: 2000Hz
  # Speaker power-amplifier enable (net EN_PA = GPIO53, per the Seeed BSP). Held high for audio.
  - platform: gpio
    id: d1001_audio_pa
    pin: GPIO53
light:
  - platform: monochromatic
    id: d1001_backlight
    output: d1001_bl_pwm
    restore_mode: ALWAYS_ON
    internal: true

display:
  - platform: mipi_dsi
    id: d1001_display
    model: SEEED-RETERMINAL-D1001
    update_interval: never
    enable_pin:
      - xl9535: d1001_expander
        number: 0          # LCD_PWR_EN (EXP_GPO0)
      - xl9535: d1001_expander
        number: 7          # alim/backlight (EXP_GPO7)
    reset_pin:
      xl9535: d1001_expander
      number: 2            # LCD_RST (EXP_GPO2)

# Tactile GSL3670 via le composant officiel (clydebarrow, modèle seeed-reterminal-d1001 :
# firmware binaire dédié + reset/init corrects). Cf. external_components ci-dessous.
touchscreen:
  - platform: gsl3670
    id: d1001_touch
    model: seeed-reterminal-d1001
    i2c_id: i2c_panel
    # Use the official model defaults (interrupt 16, calibration, transform, firmware).
    # Only the reset needs our XL9535 hub id; the correct reset line is pin 14 (not 12).
    reset_pin:
      xl9535: d1001_expander
      number: 14

external_components:
  # gsl3670 needs the touchscreen base changes from the same PR (option_with_default).
  - source: github://clydebarrow/esphome@gsl3670
    components: [gsl3670, touchscreen]

lvgl:
  displays:
    - d1001_display
  touchscreens:
    - d1001_touch

# === Audio (voice assistant) ===
# The D1001 wires the speaker (ES8311) and the dual mic (ES7210) to TWO SEPARATE I2S
# peripherals (I2S0 + I2S1), so the ESP32-P4 shared-bus full-duplex limitation
# (esphome#16043) does NOT apply here. Pins from the Seeed reTerminal-D1001 BSP
# (driver_examples/02_I2SCodec_es7210/main/example_config.h). Codecs on the system I2C bus.
i2s_audio:
  - id: i2s_spk            # ES8311 speaker path (I2S #0)
    i2s_mclk_pin: GPIO33
    i2s_bclk_pin: GPIO32
    i2s_lrclk_pin: GPIO31
  - id: i2s_mic            # ES7210 microphone path (I2S #1, independent bus)
    i2s_mclk_pin: GPIO29
    i2s_bclk_pin: GPIO28
    i2s_lrclk_pin: GPIO27

audio_dac:
  - platform: es8311
    id: d1001_es8311
    i2c_id: i2c_sys
    address: 0x18
    sample_rate: 16000
    bits_per_sample: 16bit

audio_adc:
  - platform: es7210
    id: d1001_es7210
    i2c_id: i2c_sys
    address: 0x40
    sample_rate: 16000
    bits_per_sample: 16bit
    mic_gain: 30db

speaker:
  - platform: i2s_audio
    id: d1001_speaker
    i2s_audio_id: i2s_spk
    dac_type: external
    i2s_dout_pin: GPIO30
    channel: mono
    sample_rate: 16000
    bits_per_sample: 16bit

microphone:
  - platform: i2s_audio
    id: d1001_microphone
    i2s_audio_id: i2s_mic
    adc_type: external
    i2s_din_pin: GPIO26
    pdm: false
    channel: left
    sample_rate: 16000
    bits_per_sample: 16bit
