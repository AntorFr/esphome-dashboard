# Config Dial Bureau — remplacement de esp-dial (parité fonctionnelle).
# Navigation : molette = focus (menu/groupe) / réglage (carte) ; bouton = valider /
# maintien = retour ; tactile = tap. Veille horloge après inactivité.
#
# En dev local : external_components -> ../components.
# En prod : remplacer par  { source: github://AntorFR/esphome-dashboard }
substitutions:
  device_name: dial-office-desk
  friendly_name: Dial Bureau
  area: Bureau

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  area: ${area}

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${device_name}
    password: !secret ap_password

api:
  reboot_timeout: 15min
  encryption:
    key: !secret api_encryption

ota:
  platform: esphome
  password: !secret ota_password

logger:
  level: DEBUG

external_components:
  - source:
      type: local
      path: ../components

packages:
  board: !include ../packages/boards/m5stack_dial.yaml
  fonts: !include ../packages/fonts/montserrat_fr_dial.yaml

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Paris

# === Entités Home Assistant ===
switch:
  - platform: homeassistant
    id: perf_mode
    entity_id: switch.capteur_bureau_mouse_keep_awake
    name: "Mode Performance"
    internal: true
  - platform: homeassistant
    id: meeting_mode
    entity_id: input_boolean.meeting_mode
    name: "Mode Réunion"
    internal: true
  - platform: homeassistant
    id: iron
    entity_id: switch.office_solder_iron_switch_fer_souder
    name: "Fer à souder"
    internal: true
  - platform: homeassistant
    id: core_one
    entity_id: switch.office_entry_power_strip_switch_1
    name: "Core One"
    internal: true

cover:
  - platform: homeassistant_addon
    id: cover_portail
    entity_id: cover.portail_2
    name: "Portail"
    internal: true

climate:
  - platform: homeassistant_addon
    id: climate_chauffage
    entity_id: climate.mobile_heater_plug_thermostat
    name: "Chauffage"
    internal: true

homeassistant_addon:
  media_players:
    - id: media_bureau
      entity_id: media_player.bureau_2
      volume_step: 0.05

ha_dashboard:
  profile: dial
  language: fr
  inactivity_timeout: 30s
  encoder: dial_encoder
  encoder_button: dial_button
  time_id: sntp_time
  weather:
    entity: weather.petit_mars
  font_small: ha_font_small
  font_medium: ha_font_medium
  font_large: ha_font_large
  font_weather: ha_font_weather
  font_icons: ha_font_icons
  groups:
    - name: "Focus"
      icon: settings
      cards:
        - { type: switch, switch_id: perf_mode,    name: "Mode Performance", color: "#2E7D32" }
        - { type: switch, switch_id: meeting_mode, name: "Mode Réunion",      color: "#7B1FA2" }
    - name: "Outils"
      icon: power
      cards:
        - { type: switch, switch_id: iron,     name: "Fer à souder", color: "#D32F2F" }
        - { type: switch, switch_id: core_one, name: "Core One",      color: "#0097A7" }
    - name: "Musique"
      icon: speaker
      cards:
        - { type: media_player, media_player_id: media_bureau, name: "Enceinte", color: "#A06CFF" }
    - name: "Chauffage"
      icon: thermostat
      cards:
        - { type: climate, climate_id: climate_chauffage, name: "Chauffage", color: "#03A964" }
    - name: "Portail"
      icon: gate
      cards:
        - { type: cover, cover_id: cover_portail, name: "Portail", color: "#577EFF" }
