# Config de test réaliste — Dial Bureau (reprend les menus du device réel).
# Cartes BINAIRES uniquement pour ce premier test (card switch = binding HA réel).
# Les menus Musique / Chauffage / Portail (media_player / climate / cover) arriveront
# en M5 — laissés en commentaire ci-dessous.
#
# En dev local : external_components pointe sur ../components.
# En prod : remplacer par  { source: github://AntorFR/esphome-dashboard }
substitutions:
  device_name: dial-office-desk
  friendly_name: Dial Bureau
  area: Bureau

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  area: ${area}

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${device_name}
    password: !secret ap_password

api:
  reboot_timeout: 15min
  encryption:
    key: !secret api_encryption

ota:
  platform: esphome
  password: !secret ota_password

logger:
  level: DEBUG

external_components:
  - source:
      type: local
      path: ../components

packages:
  board: !include ../packages/boards/m5stack_dial.yaml

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Paris

# === Entités Home Assistant liées (cartes binaires) ===
switch:
  - platform: homeassistant
    id: perf_mode
    entity_id: switch.capteur_bureau_mouse_keep_awake
    name: "Mode Performance"
    internal: true
  - platform: homeassistant
    id: meeting_mode
    entity_id: input_boolean.meeting_mode
    name: "Mode Réunion"
    internal: true
  - platform: homeassistant
    id: iron
    entity_id: switch.office_solder_iron_switch_fer_souder
    name: "Fer à souder"
    internal: true
  - platform: homeassistant
    id: core_one
    entity_id: switch.office_entry_power_strip_switch_1
    name: "Core One"
    internal: true

ha_dashboard:
  profile: dial
  language: fr
  inactivity_timeout: 30s
  encoder: dial_encoder
  encoder_button: dial_button
  groups:
    - name: "Focus"
      icon: settings
      cards:
        - { type: switch, switch_id: perf_mode,    name: "Mode Performance", color: "#2E7D32" }
        - { type: switch, switch_id: meeting_mode, name: "Mode Réunion",      color: "#7B1FA2" }
    - name: "Outils"
      icon: power
      cards:
        - { type: switch, switch_id: iron,     name: "Fer à souder", color: "#D32F2F" }
        - { type: switch, switch_id: core_one, name: "Core One",      color: "#0097A7" }

    # === À venir en M5 (cartes dédiées) — non binaires, non bindables en switch ===
    # - name: "Musique"   # media_player.ma_bureau (card media_player)
    # - name: "Chauffage" # climate.mobile_heater_plug_thermostat (card climate)
    # - name: "Portail"   # cover.portail_2 (card cover)
