external_components:
  - source:
      type: local
      path: ../components

packages:
  board: !include ../packages/boards/reterminal_d1001.yaml
  fonts: !include ../packages/fonts/montserrat_fr.yaml

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Paris

# === Voice assistant (wake word local + HA Assist), reflected into the dashboard overlay ===
# Audio hardware (I2S buses, ES8311/ES7210, speaker, microphone, PA) lives in the board package.
# NB: the board sets execute_from_psram (CONFIG_SPIRAM_XIP_FROM_PSRAM) — required on the P4 or
# the audio stack asserts esp_task_stack_is_sane_cache_disabled at boot.
# Always-on MIXER speaker chain (mirrors HA Voice PE) so short announcements/TTS actually play.
# Problem: the speaker media_player waits to buffer INITIAL_BUFFER_MS before it starts its own
# i2s, and a short MP3 (HA's TTS) finishes decoding first -> it never starts -> silence. Routing
# the pipeline through a resampler into an always-running mixer keeps the i2s live, so the decoded
# PCM flows out immediately. The resampler also converts any source rate to the hardware's 16 kHz.
#   announcement_pipeline -> announcement_resampling_speaker -> announcement_mixing_input
#                         -> mixing_speaker -> d1001_speaker (i2s, always on)
speaker:
  - platform: mixer
    id: mixing_speaker
    output_speaker: d1001_speaker      # the board's raw i2s speaker (16 kHz, ES8311)
    source_speakers:
      - id: announcement_mixing_input
      - id: media_mixing_input
  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input

# format: NONE compiles ALL decoders (MP3/FLAC/WAV/OPUS). Required because HA streams the TTS
# response as an .mp3 URL (api/tts_proxy/*.mp3); a fixed FLAC format would only build the FLAC
# decoder, so the MP3 reader failed with ESP_ERR_NOT_SUPPORTED and looped forever.
media_player:
  - platform: speaker
    id: d1001_media
    name: "Enceinte D1001"   # exposed to HA so it can play TTS/announcements/media to the device
    announcement_pipeline:
      speaker: announcement_resampling_speaker
      format: NONE
    media_pipeline:
      speaker: media_resampling_speaker
      format: NONE
    files:
      - id: wake_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/wake_word_triggered.flac
      - id: timer_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac
      - id: click_sound   # short UI click for touch feedback (WAV — avoids the mono-MP3 issue)
        file: sounds/click.wav

micro_wake_word:
  models:
    - model: okay_nabu
  microphone:
    microphone: d1001_microphone
  on_wake_word_detected:
    - media_player.speaker.play_on_device_media_file:  # "ding" when the wake word is caught
        id: d1001_media
        media_file: wake_sound
        announcement: true
    - voice_assistant.start:

voice_assistant:
  id: d1001_voice
  microphone:
    microphone: d1001_microphone
  media_player: d1001_media
  # Mirror the pipeline stages into our overlay via the ha_dashboard C++ API.
  on_listening:
    - lambda: "id(d1001_dash)->voice_listening();"
  on_stt_end:
    - lambda: "id(d1001_dash)->voice_thinking();"
  on_tts_start:
    - lambda: "id(d1001_dash)->voice_responding();"
  on_end:
    - lambda: "id(d1001_dash)->voice_end();"
    - micro_wake_word.start:
  on_error:
    - lambda: "id(d1001_dash)->voice_error();"
  on_client_connected:
    - lambda: "id(d1001_dash)->voice_set_available(true);"
    - micro_wake_word.start:      # start local wake-word detection once HA (Assist) is connected
    - delay: 4s                   # let HA settle, then pull the weather forecast
    - script.execute: fetch_forecast
  on_client_disconnected:
    - lambda: "id(d1001_dash)->voice_set_available(false);"
    - micro_wake_word.stop:
  on_timer_started:
    - lambda: "id(d1001_dash)->timer_started(timer.id, timer.name, timer.seconds_left);"
  on_timer_updated:
    - lambda: "id(d1001_dash)->timer_updated(timer.id, timer.seconds_left, timer.is_active);"
  on_timer_cancelled:
    - lambda: "id(d1001_dash)->timer_cancelled(timer.id);"
  on_timer_finished:
    - lambda: "id(d1001_dash)->timer_finished(timer.id);"
    - media_player.speaker.play_on_device_media_file:  # alarm sound when a timer finishes
        id: d1001_media
        media_file: timer_sound
        announcement: true

# === Entités Home Assistant liées (cartes binaires) ===
switch:
  # Touch click feedback on/off (settings entity, gates ha_dashboard on_tap).
  - platform: template
    name: "Clic tactile"
    id: cfg_click
    icon: mdi:gesture-tap
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
  - platform: homeassistant
    id: perf_mode
    entity_id: switch.capteur_bureau_mouse_keep_awake
    name: "Mode Performance"
    internal: true
  - platform: homeassistant
    id: meeting_mode
    entity_id: input_boolean.meeting_mode
    name: "Mode Réunion"
    internal: true
  - platform: homeassistant
    id: iron
    entity_id: switch.office_solder_iron_switch_fer_souder
    name: "Fer à souder"
    internal: true
  - platform: homeassistant
    id: core_one
    entity_id: switch.office_entry_power_strip_switch_1
    name: "Core One"
    internal: true

# Entités non-switch via homeassistant_addon (cover/climate/media_player).
cover:
  - platform: homeassistant_addon
    id: cover_portail
    entity_id: cover.portail_2
    name: "Portail"
    internal: true

climate:
  - platform: homeassistant_addon
    id: climate_chauffage
    entity_id: climate.mobile_heater_plug_thermostat
    name: "Chauffage"
    internal: true

homeassistant_addon:
  media_players:
    - id: media_bureau
      entity_id: media_player.bureau_2
      volume_step: 0.05

# Configurable settings, exposed to HA AND driven by the on-device settings screen (single
# source of truth). Each applies its effect in on_value and persists (restore_value).
number:
  - platform: template
    name: "Volume"
    id: cfg_volume
    icon: mdi:volume-high
    optimistic: true
    restore_value: true
    initial_value: 60
    min_value: 0
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    mode: slider
    on_value:
      - media_player.volume_set:
          id: d1001_media
          volume: !lambda "return x / 100.0f;"
  - platform: template
    name: "Luminosité"
    id: cfg_brightness
    icon: mdi:brightness-6
    optimistic: true
    restore_value: true
    initial_value: 100
    min_value: 10
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    mode: slider
    on_value:
      - light.turn_on:
          id: d1001_backlight
          brightness: !lambda "return x / 100.0f;"
  - platform: template
    name: "Mise en veille"
    id: cfg_standby
    icon: mdi:timer-outline
    optimistic: true
    restore_value: true
    initial_value: 3
    min_value: 0        # 0 = jamais (veille prolongée désactivée)
    max_value: 30
    step: 1
    unit_of_measurement: "min"
    mode: box
    on_value:
      - lambda: "id(d1001_dash)->set_deep_standby_timeout(x <= 0 ? 0 : (uint32_t)(x * 60000));"

ha_dashboard:
  id: d1001_dash
  profile: reterminal_d1001
  language: fr
  inactivity_timeout: 120s
  time_id: sntp_time
  # Audible click feedback on button/tile taps — gated by the "Clic tactile" switch (HA entity).
  on_tap:
    - if:
        condition:
          switch.is_on: cfg_click
        then:
          - media_player.speaker.play_on_device_media_file:
              id: d1001_media
              media_file: click_sound
              announcement: true
  # Extended standby: the backlight turns off after the "Mise en veille" delay (the cfg_standby
  # number drives set_deep_standby_timeout); the next touch or wake word turns it back on.
  on_deep_standby:
    - light.turn_off: d1001_backlight
  on_wake:
    - light.turn_on: d1001_backlight
  # Settings shade (swipe down from the top): reads/writes these entities + shows the battery.
  volume_number: cfg_volume
  brightness_number: cfg_brightness
  standby_number: cfg_standby
  click_switch: cfg_click
  battery_sensor: d1001_battery
  charging_sensor: d1001_charging
  weather:
    entity: weather.petit_mars
  font_small: ha_font_small
  font_medium: ha_font_medium
  font_large: ha_font_large
  font_weather: ha_font_weather
  font_icons: ha_font_icons
  font_icons_lg: ha_font_icons_lg
  font_voice: ha_font_voice
  font_nestor: ha_font_nestor
  font_nestor_lg: ha_font_nestor_lg
  # Pas d'encodeur/bouton : navigation tactile seule sur le D1001.
  groups:
    - name: "Focus"
      icon: settings
      cards:
        - { type: switch, switch_id: perf_mode,    name: "Mode Performance", color: "#2E7D32" }
        - { type: switch, switch_id: meeting_mode, name: "Mode Réunion",      color: "#7B1FA2" }
    - name: "Outils"
      icon: power
      cards:
        - { type: switch, switch_id: iron,     name: "Fer à souder", color: "#D32F2F" }
        - { type: switch, switch_id: core_one, name: "Core One",      color: "#0097A7" }
    - name: "Maison"
      icon: home
      cards:
        - { type: media_player, media_player_id: media_bureau, name: "Enceinte", color: "#A06CFF" }
        - { type: climate, climate_id: climate_chauffage, name: "Chauffage", climate_kind: radiator }
        - { type: cover, cover_id: cover_portail, name: "Portail", color: "#577EFF", cover_kind: gate }
    # Music Library launcher tab (kids): favourites of profile "Timothée" -> his speaker.
    - name: "Histoires"
      icon: music
      type: music_library
      http_request_id: ml_http
      # Plaintext HTTP (port 80): avoids the per-image TLS handshake on the device (faster,
      # less RAM) — the API is exposed on http:// alongside https://. Covers/thumbnails are
      # served from this same host, so they stay on http too (see match_base_scheme).
      base_url: "http://music-library.berard.me"
      owner: "Sébastien"
      player: "RINCON_B8E937D6A3F601400"  # Sonos Salle à manger
      player_name: "Salle à manger"       # shown in the launch-confirmation toast
      image_format: ${ml_img_fmt}          # jpg | bmp — appends ?fmt= to cover/thumb URLs
      cover_slots: [cov0, cov1, cov2, cov3, cov4, cov5, cov6, cov7, cov8, cov9]
      thumb_slots: [thm0, thm1, thm2, thm3, thm4, thm5, thm6, thm7, thm8, thm9,
                    thm10, thm11, thm12, thm13, thm14, thm15]
