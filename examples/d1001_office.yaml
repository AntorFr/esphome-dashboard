# Config de test réaliste — reTerminal D1001 (ESP32-P4), mêmes menus que dial_office.yaml.
# Cartes BINAIRES uniquement (card switch = binding HA réel).
# Musique / Chauffage / Portail (media_player / climate / cover) = M5.
#
# Le board fournit display MIPI-DSI, tactile GSL3670 (composant gsl3670), lvgl, psram,
# esp_ldo ET esp32_hosted (WiFi via C6). Brochage extrait du schéma officiel Seeed.
# Navigation tactile (tap sur les tuiles). À valider sur matériel.
# En prod : remplacer external_components par { source: github://AntorFR/esphome-dashboard }.
substitutions:
  device_name: d1001-office
  friendly_name: reTerminal Bureau
  area: Bureau

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  area: ${area}

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${device_name}
    password: !secret ap_password

api:
  reboot_timeout: 15min
  encryption:
    key: !secret api_encryption

ota:
  platform: esphome
  password: !secret ota_password

logger:
  level: DEBUG

# HTTP client for the Music Library launcher (ESP -> music-library REST API).
http_request:
  id: ml_http
  timeout: 5s
  verify_ssl: false

external_components:
  - source:
      type: local
      path: ../components

packages:
  board: !include ../packages/boards/reterminal_d1001.yaml
  fonts: !include ../packages/fonts/montserrat_fr.yaml

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Paris

# === Entités Home Assistant liées (cartes binaires) ===
switch:
  - platform: homeassistant
    id: perf_mode
    entity_id: switch.capteur_bureau_mouse_keep_awake
    name: "Mode Performance"
    internal: true
  - platform: homeassistant
    id: meeting_mode
    entity_id: input_boolean.meeting_mode
    name: "Mode Réunion"
    internal: true
  - platform: homeassistant
    id: iron
    entity_id: switch.office_solder_iron_switch_fer_souder
    name: "Fer à souder"
    internal: true
  - platform: homeassistant
    id: core_one
    entity_id: switch.office_entry_power_strip_switch_1
    name: "Core One"
    internal: true

# Entités non-switch via homeassistant_addon (cover/climate/media_player).
cover:
  - platform: homeassistant_addon
    id: cover_portail
    entity_id: cover.portail_2
    name: "Portail"
    internal: true

climate:
  - platform: homeassistant_addon
    id: climate_chauffage
    entity_id: climate.mobile_heater_plug_thermostat
    name: "Chauffage"
    internal: true

homeassistant_addon:
  media_players:
    - id: media_bureau
      entity_id: media_player.bureau_2
      volume_step: 0.05

ha_dashboard:
  profile: reterminal_d1001
  language: fr
  inactivity_timeout: 30s
  time_id: sntp_time
  weather:
    entity: weather.petit_mars
  font_small: ha_font_small
  font_medium: ha_font_medium
  font_large: ha_font_large
  font_weather: ha_font_weather
  font_icons: ha_font_icons
  # Pas d'encodeur/bouton : navigation tactile seule sur le D1001.
  groups:
    - name: "Focus"
      icon: settings
      cards:
        - { type: switch, switch_id: perf_mode,    name: "Mode Performance", color: "#2E7D32" }
        - { type: switch, switch_id: meeting_mode, name: "Mode Réunion",      color: "#7B1FA2" }
    - name: "Outils"
      icon: power
      cards:
        - { type: switch, switch_id: iron,     name: "Fer à souder", color: "#D32F2F" }
        - { type: switch, switch_id: core_one, name: "Core One",      color: "#0097A7" }
    - name: "Musique"
      icon: speaker
      cards:
        - { type: media_player, media_player_id: media_bureau, name: "Enceinte", color: "#A06CFF" }
    - name: "Chauffage"
      icon: thermostat
      cards:
        - { type: climate, climate_id: climate_chauffage, name: "Chauffage", color: "#03A964" }
    - name: "Portail"
      icon: gate
      cards:
        - { type: cover, cover_id: cover_portail, name: "Portail", color: "#577EFF" }
    # Music Library launcher tab (kids): favourites of profile "Timothée" -> his speaker.
    - name: "Histoires"
      icon: music
      type: music_library
      http_request_id: ml_http
      base_url: "https://music-library.berard.me"
      owner: "Timothée"
      player: "RINCON_74CA60C838E601400"
