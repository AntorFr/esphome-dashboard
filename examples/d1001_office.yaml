# Config de test réaliste — reTerminal D1001 (ESP32-P4), mêmes menus que dial_office.yaml.
# Cartes BINAIRES uniquement (card switch = binding HA réel).
# Musique / Chauffage / Portail (media_player / climate / cover) = M5.
#
# Le board fournit display MIPI-DSI, tactile GSL3670 (composant gsl3670), lvgl, psram,
# esp_ldo ET esp32_hosted (WiFi via C6). Brochage extrait du schéma officiel Seeed.
# Navigation tactile (tap sur les tuiles). À valider sur matériel.
# En prod : remplacer external_components par { source: github://AntorFR/esphome-dashboard }.
substitutions:
  device_name: d1001-office
  friendly_name: reTerminal Bureau
  area: Bureau
  # Launcher cover encoding — A/B knob: jpg (small transfer, slow DCT decode that can stall the
  # loop) vs bmp (bigger transfer, ~free decode). Drives BOTH the online_image slots' format and
  # the music_library group's image_format (online_image accepts jpg/bmp, upper-cased internally).
  ml_img_fmt: jpg

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  area: ${area}
  on_boot:
    # Start local wake-word detection once everything is up (also (re)started on HA connect
    # and after each pipeline run, see voice_assistant below).
    - priority: -100
      then:
        - delay: 2s
        - micro_wake_word.start:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Keep the radio always on. The ESP32 default (light) sleeps between beacons, which adds
  # latency and drops time-sensitive streamed fetches (HA TTS/media over the C6/SDIO link) —
  # the cause of the intermittent "TTS plays once then nothing". HA Voice PE also uses none.
  power_save_mode: none
  ap:
    ssid: ${device_name}
    password: !secret ap_password

api:
  reboot_timeout: 15min
  encryption:
    key: !secret api_encryption

ota:
  platform: esphome
  password: !secret ota_password

logger:
  level: DEBUG

# Diagnostics for the WiFi/stability investigation: heap + loop health, and the reset reason
# (tells us WHY a reboot happened — watchdog / brownout / panic — if the instability recurs).
debug:
  update_interval: 30s

text_sensor:
  - platform: debug
    reset_reason:
      name: "Reset Reason"

# Multi-day weather forecast, fetched directly from HA via weather.get_forecasts (capture_response:
# no HA-side template sensor needed). The response JSON is reformatted into a compact
# "condition|low|high;..." string and handed to the dashboard. Fetched on HA connect + every 30 min.
script:
  - id: fetch_forecast
    then:
      - homeassistant.action:
          action: weather.get_forecasts
          data:
            entity_id: weather.petit_mars
            type: daily
          capture_response: true
          on_success:
            - lambda: |-
                // HA wraps the service response one level deep under "response".
                std::string out;
                int n = 0;
                JsonArrayConst f = response["response"]["weather.petit_mars"]["forecast"].as<JsonArrayConst>();
                for (JsonObjectConst d : f) {
                  if (n++ >= 6) break;
                  if (!out.empty()) out += ";";
                  out += std::string(d["condition"].as<const char *>()) + "|" +
                         std::to_string((int) lroundf(d["templow"].as<float>())) + "|" +
                         std::to_string((int) lroundf(d["temperature"].as<float>()));
                }
                id(d1001_dash)->set_forecast(out);
          on_error:
            - logger.log:
                format: "get_forecasts action FAILED"
                level: WARN

interval:
  - interval: 30min
    then:
      - script.execute: fetch_forecast

# Side button (GPIO3, active-low): short-press toggles extended standby (backlight off/on).
binary_sensor:
  - platform: gpio
    id: d1001_side_button
    pin:
      number: GPIO3
      mode:
        input: true
        pullup: true
      inverted: true
    on_press:
      - lambda: "id(d1001_dash)->toggle_deep_standby();"

sensor:
  - platform: debug
    free:
      name: "Heap libre"
    fragmentation:
      name: "Heap fragmentation"
    loop_time:
      name: "Loop time"

