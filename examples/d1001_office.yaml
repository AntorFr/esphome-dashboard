# Config de test réaliste — reTerminal D1001 (ESP32-P4), mêmes menus que dial_office.yaml.
# Cartes BINAIRES uniquement (card switch = binding HA réel).
# Musique / Chauffage / Portail (media_player / climate / cover) = M5.
#
# Le board fournit display MIPI-DSI, tactile GSL3670 (composant gsl3670), lvgl, psram,
# esp_ldo ET esp32_hosted (WiFi via C6). Brochage extrait du schéma officiel Seeed.
# Navigation tactile (tap sur les tuiles). À valider sur matériel.
# En prod : remplacer external_components par { source: github://AntorFR/esphome-dashboard }.
substitutions:
  device_name: d1001-office
  friendly_name: reTerminal Bureau
  area: Bureau
  # Launcher cover encoding — A/B knob: jpg (small transfer, slow DCT decode that can stall the
  # loop) vs bmp (bigger transfer, ~free decode). Drives BOTH the online_image slots' format and
  # the music_library group's image_format (online_image accepts jpg/bmp, upper-cased internally).
  ml_img_fmt: jpg

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  area: ${area}
  on_boot:
    # Start local wake-word detection once everything is up (also (re)started on HA connect
    # and after each pipeline run, see voice_assistant below).
    - priority: -100
      then:
        - delay: 2s
        - micro_wake_word.start:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${device_name}
    password: !secret ap_password

api:
  reboot_timeout: 15min
  encryption:
    key: !secret api_encryption

ota:
  platform: esphome
  password: !secret ota_password

logger:
  level: DEBUG

# Diagnostics for the WiFi/stability investigation: heap + loop health, and the reset reason
# (tells us WHY a reboot happened — watchdog / brownout / panic — if the instability recurs).
debug:
  update_interval: 30s

text_sensor:
  - platform: debug
    reset_reason:
      name: "Reset Reason"

sensor:
  - platform: debug
    free:
      name: "Heap libre"
    fragmentation:
      name: "Heap fragmentation"
    loop_time:
      name: "Loop time"

# HTTP client for the Music Library launcher (ESP -> music-library REST API).
http_request:
  id: ml_http
  timeout: 5s
  verify_ssl: false

# Cover-image pool for the launcher (one slot per favourite). URLs are set at runtime; the
# initial url is just a required placeholder. JPEG -> RGB565, downloaded/decoded async.
online_image:
  - { id: cov0, url: "http://music-library.berard.me/covers/_.jpg", format: "${ml_img_fmt}", type: RGB565, update_interval: never, http_request_id: ml_http }
  - { id: cov1, url: "http://music-library.berard.me/covers/_.jpg", format: "${ml_img_fmt}", type: RGB565, update_interval: never, http_request_id: ml_http }
  - { id: cov2, url: "http://music-library.berard.me/covers/_.jpg", format: "${ml_img_fmt}", type: RGB565, update_interval: never, http_request_id: ml_http }
  - { id: cov3, url: "http://music-library.berard.me/covers/_.jpg", format: "${ml_img_fmt}", type: RGB565, update_interval: never, http_request_id: ml_http }
  - { id: cov4, url: "http://music-library.berard.me/covers/_.jpg", format: "${ml_img_fmt}", type: RGB565, update_interval: never, http_request_id: ml_http }
  - { id: cov5, url: "http://music-library.berard.me/covers/_.jpg", format: "${ml_img_fmt}", type: RGB565, update_interval: never, http_request_id: ml_http }
  - { id: cov6, url: "http://music-library.berard.me/covers/_.jpg", format: "${ml_img_fmt}", type: RGB565, update_interval: never, http_request_id: ml_http }
  - { id: cov7, url: "http://music-library.berard.me/covers/_.jpg", format: "${ml_img_fmt}", type: RGB565, update_interval: never, http_request_id: ml_http }
  - { id: cov8, url: "http://music-library.berard.me/covers/_.jpg", format: "${ml_img_fmt}", type: RGB565, update_interval: never, http_request_id: ml_http }
  - { id: cov9, url: "http://music-library.berard.me/covers/_.jpg", format: "${ml_img_fmt}", type: RGB565, update_interval: never, http_request_id: ml_http }
  # Detail pool (separate from the grid): slot 0 = header cover / now-playing art, slots 1.. =
  # episode thumbnails. Kept apart so drilling in/out never re-downloads the grid covers.
  - { id: thm0, url: "http://music-library.berard.me/covers/_.jpg", format: "${ml_img_fmt}", type: RGB565, update_interval: never, http_request_id: ml_http }
  - { id: thm1, url: "http://music-library.berard.me/covers/_.jpg", format: "${ml_img_fmt}", type: RGB565, update_interval: never, http_request_id: ml_http }
  - { id: thm2, url: "http://music-library.berard.me/covers/_.jpg", format: "${ml_img_fmt}", type: RGB565, update_interval: never, http_request_id: ml_http }
